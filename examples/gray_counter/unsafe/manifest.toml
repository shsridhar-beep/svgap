schema_version = "1.0"
candidate_id = "binary-bus-crossing-unsafe"
[design]
top = "gray_counter"
sources = ["design.sv"]
[functional]
commands = [
  ["iverilog", "-g2012", "-o", "${SVGAP_BUILD}/sim.vvp", "design.sv", "../tb.sv"],
  ["vvp", "${SVGAP_BUILD}/sim.vvp"],
]
[structural]
backend = "reference-yosys"
[intent]
asynchronous_groups = [["source"], ["destination"]]
[[intent.clocks]]
name = "source"
port = "src_clk"
[[intent.clocks]]
name = "destination"
port = "dst_clk"
[output]
report = "build/report.json"
