name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

jobs:
  assets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Verify tag matches package version
        run: |
          expected="v$(python -c 'import tomllib; print(tomllib.load(open("pyproject.toml", "rb"))["project"]["version"].replace("a", "-alpha."))')"
          test "$GITHUB_REF_NAME" = "$expected"
      - run: python -m pip install build
      - run: python -m build
      - name: Build immutable research archives
        run: |
          git archive --format=tar.gz --prefix=reset-replication-v0.1/ -o dist/reset-replication-v0.1.tar.gz HEAD:artifacts/reset-replication-v0.1
          git archive --format=tar.gz --prefix=reset-taskpack-v0.2/ -o dist/reset-taskpack-v0.2.tar.gz HEAD:taskpacks/reset-replication-v0.2
          cp schemas/report-v1.json schemas/functional-result-v1.json dist/
          sha256sum dist/* > dist/SHA256SUMS
      - name: Create prerelease with assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" dist/* \
            --repo "$GITHUB_REPOSITORY" \
            --prerelease \
            --title "SV-Gap $GITHUB_REF_NAME" \
            --notes-file docs/release-notes-v0.2.0-alpha.1.md

  container:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ github.ref_name }}
            ghcr.io/${{ github.repository }}:0.2-alpha
